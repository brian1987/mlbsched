# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # NOTE: the CI FLY_API_TOKEN is a scoped deploy token authorized for the
      # depot builder only. Do NOT switch to --depot=false (Fly's legacy remote
      # builder) without first re-issuing a broader-scoped token — it fails with
      # "remote builder heartbeat: unauthorized". If depot is down, deploy from a
      # full-auth machine: `fly deploy --depot=false --remote-only`.
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
